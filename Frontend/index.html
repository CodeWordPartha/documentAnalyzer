<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">

                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Document Analyzer</h3>
                        <p class="text-center text-muted mb-4">Intelligent Document Management System</p>

                        <div id="errorAlert" class="alert alert-danger d-none"></div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="Enter your email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Enter your password">
                        </div>

                        <button onclick="login()" class="btn btn-primary w-100" id="loginBtn">
                            Login
                        </button>
                        <div class="alert alert-info mt-3 small">
                            <strong>⚠️ Please Note:</strong> This app is hosted on a free server that 
                            sleeps after inactivity. First login may take <strong>30-60 seconds</strong>. 
                            Please be patient! ☕
                        </div>
                        <p class="text-center mt-3 text-muted">
    Don't have an account? 
    <a href="register.html">Register here</a>
</p>

                        <p class="text-center mt-3 text-muted small">
                            Document Analyzer v1.0
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
